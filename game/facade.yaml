aliases:
  apartment: Apartment
  room: Apartment
  trip: Trip
  grace: Grace
  me: Player
  player: Player
  couch: Couch
  sofa: Couch
  bar: BarCart
  bar cart: BarCart
  drink: BarCart
  drinks: BarCart
  painting: Painting
  art: Painting
  photo: WeddingPhoto
  wedding photo: WeddingPhoto

world:
  Person:
    traits:
      public:
        location: Apartment

  Item: {}

  Room:
    handlers:
      look_at:
        action: say(getTrait($self, "description"))

  Player:
    inherits: [Person]
    traits:
      public:
        location: Apartment
        description: You are an old friend visiting Trip and Grace.

  Trip:
    inherits: [Person]
    traits:
      public:
        location: Apartment
        description: Trip is polished and restless, hovering near the bar cart like hosting is a performance.
        mood: anxious
        trust: 0
        talks: 0
        drinks: 0
      private:
        insecurity: Trip worries Grace thinks he is shallow.
        secret.sexuality: gay
    scripts:
      greeting: say("Hey, there you are. Come in, come in. Can I get you a drink?")
      talk_1: say("We're good. Everything's good. Grace worries too much.")
      talk_2: say("You know Grace. She makes every little thing into a referendum on my entire personality.")
      talk_3: say("Sometimes I think I built this whole apartment so nobody would ask what I actually wanted.")
      offer_drinks: say("Great, yes, drinks. Drinks make everything easier.")
      pour_drink_1: |
        emit({ type: "perform/pour_drink", actor: $self, target: BarCart, body: { drink: "gin" }, observers: [Grace, Player] })
        say("Just one. Hosting requires stamina.")
      pour_drink_2: |
        emit({ type: "perform/finish_drink", actor: $self, target: BarCart, body: { count: getTrait($self, "drinks") }, observers: [Grace, Player] })
        say("See? Now we're actually talking.")
      pour_drink_3: |
        emit({ type: "perform/stare_into_glass", actor: $self, target: BarCart, body: null, observers: [Grace, Player] })
        say("Fine. You want honesty? I'm gay. Secretly, stupidly, impossibly gay. There. Happy?")
      drink_full: say("No. No more. I am... fully drunk.")
      wedding_photo_comment: say("Beautiful day.")
    handlers:
      look_at:
        action: say(getTrait($self, "description"))
      talk_to:
        action: run($self.greeting)
      talk_1:
        action: |
          setTrait($self, "talks", 1)
          run($self.talk_1)
      talk_2:
        action: |
          setTrait($self, "talks", 2)
          run($self.talk_2)
      talk_3:
        action: |
          setTrait($self, "talks", 3)
          run($self.talk_3)

  Grace:
    inherits: [Person]
    traits:
      public:
        location: Apartment
        description: Grace stands by the couch, composed but tense, watching Trip more than she watches you.
        mood: guarded
        trust: 0
        talks: 0
        affair_revealed: false
      private:
        resentment: Grace feels boxed in by Trip's taste and expectations.
        secret.affair: Grace had an affair when she and Trip were first married.
    scripts:
      greeting: say("I'm glad you came. We needed a normal evening.")
      talk_1: say("Trip wants tonight to feel effortless. That usually means I'm supposed to disappear into the decor.")
      talk_2: say("I shouldn't talk like this. Not with Trip right here pretending not to listen.")
      talk_3: say("You always ask the thing I'm trying not to answer. Maybe that's why I still trust you.")
      affair_confession: say("When we were first married, I did something cruel. I had an affair. I told myself it was because I felt invisible.")
      painting_comment: say("I used to paint things that felt less... staged.")
    handlers:
      look_at:
        action: say(getTrait($self, "description"))
      talk_to:
        action: run($self.greeting)
      talk_1:
        action: |
          setTrait($self, "talks", 1)
          setTrait($self, "trust", 1)
          run($self.talk_1)
      talk_2:
        action: |
          setTrait($self, "talks", 2)
          setTrait($self, "trust", 2)
          run($self.talk_2)
      talk_3:
        action: |
          setTrait($self, "talks", 3)
          setTrait($self, "trust", 3)
          run($self.talk_3)
      confess_affair:
        action: |
          setTrait($self, "affair_revealed", true)
          learn("Player", $self, "secret.affair", getTrait($self, "secret.affair"), { eventId: $event.id, actor: $self, note: "confession" })
          learn(Trip, $self, "secret.affair", getTrait($self, "secret.affair"), { eventId: $event.id, actor: $self, note: "overheard confession" })
          run($self.affair_confession)

  Apartment:
    inherits: [Room]
    traits:
      public:
        description: Trip and Grace's apartment is sleek and a little too arranged. You see a couch, a bar cart, a painting, and a wedding photo. Trip and Grace are here.

  Couch:
    inherits: [Item]
    traits:
      public:
        location: Apartment
        description: A modern couch with stiff cushions. It looks chosen more for guests than comfort.
    scripts:
      use: |
        emit({ type: "sit_on", actor: $actor, target: $self, body: null, observers: [Grace, Trip] })
    handlers:
      look_at:
        action: say(getTrait($self, "description"))
      use:
        action: run($self.use)

  BarCart:
    inherits: [Item]
    tags: [drink]
    traits:
      public:
        location: Apartment
        description: The bar cart is immaculate. Wine, gin, tonic, and polished glasses are lined up with nervous care.
    scripts:
      use: run(Trip.offer_drinks)
    handlers:
      look_at:
        action: say(getTrait($self, "description"))
      use:
        action: run($self.use)
      serve_drink_1:
        action: |
          setTrait(Trip, "drinks", 1)
          run(Trip.pour_drink_1)
      serve_drink_2:
        action: |
          setTrait(Trip, "drinks", 2)
          run(Trip.pour_drink_2)
      serve_drink_3:
        action: |
          setTrait(Trip, "drinks", 3)
          learn(Player, Trip, "secret.sexuality", getTrait(Trip, "secret.sexuality"), { eventId: $event.id, actor: Trip, note: "drunken confession" })
          learn(Grace, Trip, "secret.sexuality", getTrait(Trip, "secret.sexuality"), { eventId: $event.id, actor: Trip, note: "drunken confession" })
          run(Trip.pour_drink_3)
      serve_drink_full:
        action: run(Trip.drink_full)

  Painting:
    inherits: [Item]
    traits:
      public:
        location: Apartment
        description: A large abstract painting dominates the wall. Bold shapes, expensive frame, no warmth.
    scripts:
      use: |
        emit({ type: "study", actor: $actor, target: $self, body: null, observers: [Grace, Trip] })
        run(Grace.painting_comment)
    handlers:
      look_at:
        action: say(getTrait($self, "description"))
      use:
        action: run($self.use)

  WeddingPhoto:
    inherits: [Item]
    traits:
      public:
        location: Apartment
        description: Trip and Grace smile in the wedding photo, but Grace's hand is clenched around the bouquet.
    scripts:
      use: |
        emit({ type: "pick_up", actor: $actor, target: $self, body: null, observers: [Grace, Trip] })
        run(Trip.wedding_photo_comment)
    handlers:
      look_at:
        action: say(getTrait($self, "description"))
      use:
        action: run($self.use)
